name: NiYien Data Release

on:
  push:
    tags:
      - 'data-v*'
    paths:
      - 'distribution/data/**'
      - 'distribution/niyien.toml'
      - '_scripts/package_*.py'
      - '_scripts/package_data.py'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package merged lens payload
        run: python _scripts/package_lens.py --version ${{ github.run_number }}

      - name: Upload packaged data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gyroflow-niyien-data
          path: |
            _deployment/_binaries/gyroflow-niyien-lens.cbor.gz
            _deployment/_binaries/gyroflow-niyien-lens.cbor.gz.json

      - name: Publish data release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          files: |
            _deployment/_binaries/gyroflow-niyien-lens.cbor.gz
            _deployment/_binaries/gyroflow-niyien-lens.cbor.gz.json

      - name: Sync data assets to domestic mirror
        if: ${{ secrets.NIYIEN_MIRROR_HOST != '' && secrets.NIYIEN_MIRROR_USER != '' && secrets.NIYIEN_MIRROR_KEY != '' && secrets.NIYIEN_MIRROR_PATH != '' }}
        run: |
          mkdir -p mirror
          cp _deployment/_binaries/gyroflow-niyien-lens.cbor.gz mirror/
          cp _deployment/_binaries/gyroflow-niyien-lens.cbor.gz.json mirror/
      - name: Upload mirrored data assets
        if: ${{ secrets.NIYIEN_MIRROR_HOST != '' && secrets.NIYIEN_MIRROR_USER != '' && secrets.NIYIEN_MIRROR_KEY != '' && secrets.NIYIEN_MIRROR_PATH != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NIYIEN_MIRROR_HOST }}
          username: ${{ secrets.NIYIEN_MIRROR_USER }}
          key: ${{ secrets.NIYIEN_MIRROR_KEY }}
          source: "mirror/*"
          target: "${{ secrets.NIYIEN_MIRROR_PATH }}/${{ github.ref_name }}/"
