name: release

run-name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_label || github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_label:
        description: Optional label for a manual build run
        required: false
        type: string

permissions:
  contents: write
  actions: read
  artifact-metadata: read

jobs:
  validate-tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Niyien canonical schema requires release tags to be bare base versions
      # (e.g. v1.6.4). Suffixes like v1.6.4-niyien.1 are reserved for the
      # actions-run schema (X.Y.Z-ni.<RUN_NUMBER>) emitted by build.rs and
      # would collide with the custom comparator in src/distribution.rs.
      - name: Validate tag name
        run: |
          tag='${{ github.ref_name }}'
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $tag does not match ^v[0-9]+\\.[0-9]+\\.[0-9]+$ (bare base only)." >&2
            echo "Suffixed pre-release tags are not allowed. Trigger workflow_dispatch instead." >&2
            exit 1
          fi

  build:
    needs: [validate-tag]
    if: ${{ always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped') }}
    strategy:
      fail-fast: false
      # Linux remains paused; Android APK publishing is restored.
      matrix:
        targets: [
          { os: macos-14,      type: macos },
          { os: windows-2022,  type: windows },
          { os: windows-2022,  type: android }
        ]
    name: Build gyroflow(niyien) for ${{ matrix.targets.type }}
    runs-on: ${{ matrix.targets.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.targets.type }}-gyroflow-niyien-0
      - name: Dependencies cache
        id: extcache
        uses: actions/cache@v4
        with:
          path: '${{ github.workspace }}/ext/'
          key: ${{ matrix.targets.type }}-gyroflow-niyien-ext-0

      # Vulkan SDK 仅在 neuflow feature 开启时需要（burn wgpu 后端）。
      # 本次 release default feature 已去掉 "neuflow"，无需装 Vulkan。
      # TODO: neuflow feature 恢复时把此步骤加回来。
      # - name: Prepare Vulkan SDK
      #   uses: johnnynunez/setup-vulkan-sdk@v1
      #   with:
      #     vulkan-query-version: 1.4.304.1
      #     vulkan-components: Vulkan-Headers
      #     vulkan-use-cache: true

      - name: Force qml-video-rs rebuild (UNIX)
        if: ${{ matrix.targets.os != 'windows-2022' }}
        run: |
          rm -rf ${{ github.workspace }}/target/*/deploy/build/qml-video-rs*
          rm -rf ${{ github.workspace }}/target/deploy/build/qml-video-rs*
      - name: Force qml-video-rs rebuild (Win)
        if: ${{ matrix.targets.os == 'windows-2022' }}
        run: |
          rm -r -force ${{ github.workspace }}/target/deploy/build/qml-video-rs* -ErrorAction SilentlyContinue
          rm -r -force ${{ github.workspace }}/target/x86_64-pc-windows-msvc/deploy/build/qml-video-rs* -ErrorAction SilentlyContinue
          rm -r -force ${{ github.workspace }}/target/release/build/qml-video-rs* -ErrorAction SilentlyContinue

      - name: Install Mac certificates
        if: ${{ matrix.targets.os == 'macos-14' || matrix.targets.os == 'macos-15' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATES }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Save keystore to file
        if: ${{ matrix.targets.type == 'android' }}
        run: |
          if (-not "${{ secrets.ANDROID_RELEASE_KEYSTORE }}") {
            if ("${{ github.ref_type }}" -eq "tag") {
              throw "ANDROID_RELEASE_KEYSTORE is required for Android tag releases"
            }
            Write-Host "ANDROID_RELEASE_KEYSTORE is empty; Android workflow_dispatch will build without release signing"
            exit 0
          }
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE }}" > ${{ github.workspace }}/android_release.keystore.b64
          certutil -decode ${{ github.workspace }}/android_release.keystore.b64 ${{ github.workspace }}/android_release.keystore

      - uses: extractions/setup-just@v2

      - name: Build gyroflow(niyien) (macOS)
        if: ${{ matrix.targets.type == 'macos' }}
        env:
          SIGNING_FINGERPRINT: ${{ secrets.MACOS_CERTIFICATE_FINGERPRINT }}
        run: |
          just install-deps
          just deploy universal
          xcrun notarytool submit --wait --apple-id ${{ secrets.MACOS_ACCOUNT_USER }} --team-id ${{ secrets.MACOS_TEAM }} --password ${{ secrets.MACOS_ACCOUNT_PASS }} ${{ github.workspace }}/_deployment/_binaries/gyroflow-niyien-mac-universal.dmg
          xcrun stapler staple --verbose ${{ github.workspace }}/_deployment/_binaries/gyroflow-niyien-mac-universal.dmg

      - name: Build gyroflow(niyien) (Linux)
        if: ${{ matrix.targets.type == 'linux' }}
        run: just deploy docker

      - name: Build gyroflow(niyien) (Windows)
        if: ${{ matrix.targets.type == 'windows' }}
        run: |
          just install-deps
          just deploy

      - name: Build gyroflow(niyien) (Android)
        if: ${{ matrix.targets.type == 'android' }}
        env:
          KEY_STORE_ALIAS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_ALIAS }}
          KEY_STORE_PASS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASS }}
          BUILD_PROFILE: deploy
        run: |
          $Env:JAVA_HOME = $Env:JAVA_HOME_21_X64
          if (Test-Path "${{ github.workspace }}/android_release.keystore") {
            $Env:KEY_STORE_PATH = "${{ github.workspace }}/android_release.keystore"
          } else {
            $Env:KEY_STORE_ALIAS = ""
            $Env:KEY_STORE_PASS = ""
          }
          just android install-deps
          just android deploy

      # Release flow (tag push) — V7 + archive:false: raw bytes attached directly to GitHub release.
      - name: Upload Windows package (release)
        if: ${{ matrix.targets.type == 'windows' && startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: gyroflow-niyien-windows64.zip
          path: _deployment/_binaries/gyroflow-niyien-windows64.zip
          archive: false
          if-no-files-found: error

      - name: Upload Windows setup (release)
        if: ${{ matrix.targets.type == 'windows' && startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: gyroflow-niyien-windows64-setup.exe
          path: _deployment/_binaries/gyroflow-niyien-windows64-setup.exe
          archive: false
          if-no-files-found: error

      - name: Upload macOS package (release)
        if: ${{ matrix.targets.type == 'macos' && startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: gyroflow-niyien-mac-universal.dmg
          path: _deployment/_binaries/gyroflow-niyien-mac-universal.dmg
          archive: false
          if-no-files-found: error

      - name: Upload Android package (release)
        if: ${{ matrix.targets.type == 'android' && startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: gyroflow-niyien.apk
          path: _deployment/_binaries/gyroflow-niyien.apk
          archive: false
          if-no-files-found: error

      # Nightly flow (workflow_dispatch) — V4 with short name + no pre-zip.
      # V4's auto-archive wraps the raw build output once, so nightly.link URL
      # `<short_name>.zip` returns a wrapper containing the deliverable file.
      # Mirrors gyroflow/gyroflow upstream pattern (Gyroflow-windows.zip wrapping
      # Gyroflow-windows64.zip).
      - name: Upload Windows package (nightly)
        if: ${{ matrix.targets.type == 'windows' && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: gyroflow-niyien-windows
          path: _deployment/_binaries/gyroflow-niyien-windows64.zip
          if-no-files-found: error

      - name: Upload Windows setup (nightly)
        if: ${{ matrix.targets.type == 'windows' && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: gyroflow-niyien-win-setup
          path: _deployment/_binaries/gyroflow-niyien-windows64-setup.exe
          if-no-files-found: error

      - name: Upload macOS package (nightly)
        if: ${{ matrix.targets.type == 'macos' && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: gyroflow-niyien-mac
          path: _deployment/_binaries/gyroflow-niyien-mac-universal.dmg
          if-no-files-found: error

      - name: Upload Android package (nightly)
        if: ${{ matrix.targets.type == 'android' && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: gyroflow-niyien-android
          path: _deployment/_binaries/gyroflow-niyien.apk
          if-no-files-found: error

  github_release:
    name: Create GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release_artifacts
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          # Linux remains paused; Windows, macOS, and Android are published.
          files: |
            ./release_artifacts/gyroflow-niyien-windows64-setup.exe
            ./release_artifacts/gyroflow-niyien-windows64.zip
            ./release_artifacts/gyroflow-niyien-mac-universal.dmg
            ./release_artifacts/gyroflow-niyien.apk

