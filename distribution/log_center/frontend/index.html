<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NiYien 反馈日志中心</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="title">
      <span class="logo">NiYien</span>
      <span class="subtitle">反馈日志中心</span>
    </div>
    <div class="header-actions">
      <span id="connection-info" class="conn-info">连接中...</span>
      <button id="refresh-btn" class="btn btn-primary" title="从 /api/feedback/list 拉取最新">刷新</button>
    </div>
  </header>

  <section class="filters">
    <div class="filter-group">
      <label>起始日期</label>
      <input type="date" id="filter-since">
    </div>
    <div class="filter-group">
      <label>截止日期</label>
      <input type="date" id="filter-until">
    </div>
    <div class="filter-group">
      <label>区域</label>
      <select id="filter-region">
        <option value="all">全部</option>
        <option value="cn">国内</option>
        <option value="global">海外</option>
      </select>
    </div>
    <div class="filter-group">
      <label>状态</label>
      <select id="filter-downloaded">
        <option value="">全部</option>
        <option value="yes">已下载</option>
        <option value="no">待下载</option>
      </select>
    </div>
    <div class="filter-group">
      <label>数量上限</label>
      <input type="number" id="filter-limit" min="10" max="2000" value="500">
    </div>
    <div class="filter-spacer"></div>
    <button id="apply-filter-btn" class="btn">应用筛选</button>
    <button id="batch-delete-btn" class="btn btn-danger" disabled>
      批量删除 (<span id="selected-count">0</span>)
    </button>
  </section>

  <main class="table-wrap">
    <table class="feedback-table">
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" id="select-all"></th>
          <th class="col-id">ID</th>
          <th class="col-region">区域</th>
          <th class="col-ts">时间</th>
          <th class="col-version">版本</th>
          <th class="col-env">系统 / GPU</th>
          <th class="col-summary">描述</th>
          <th class="col-email">邮箱</th>
          <th class="col-size">大小</th>
          <th class="col-status">状态</th>
          <th class="col-actions">操作</th>
        </tr>
      </thead>
      <tbody id="feedback-tbody">
        <tr class="empty-row">
          <td colspan="11">暂无数据 — 点击 <strong>刷新</strong> 拉取。</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer class="footer">
    <div class="footer-left">
      <span>缓存: <span id="cache-size">-</span></span>
      <span class="muted" id="row-count"></span>
    </div>
    <div class="footer-right">
      <label>清理早于
        <input type="number" id="clean-days" min="0" value="60" class="small-input">
        天的解压目录
      </label>
      <button id="clean-btn" class="btn">清理</button>
    </div>
  </footer>

  <div id="toast-container"></div>
</div>

<script src="app.js"></script>
</body>
</html>
