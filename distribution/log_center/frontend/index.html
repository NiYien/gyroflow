<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NiYien Feedback Log Center</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="title">
      <span class="logo">NiYien</span>
      <span class="subtitle">Feedback Log Center</span>
    </div>
    <div class="header-actions">
      <span id="connection-info" class="conn-info">connecting...</span>
      <button id="refresh-btn" class="btn btn-primary" title="Pull latest from /api/feedback/list">Refresh</button>
    </div>
  </header>

  <section class="filters">
    <div class="filter-group">
      <label>Since</label>
      <input type="date" id="filter-since">
    </div>
    <div class="filter-group">
      <label>Until</label>
      <input type="date" id="filter-until">
    </div>
    <div class="filter-group">
      <label>Region</label>
      <select id="filter-region">
        <option value="all">all</option>
        <option value="cn">cn</option>
        <option value="global">global</option>
      </select>
    </div>
    <div class="filter-group">
      <label>State</label>
      <select id="filter-downloaded">
        <option value="">any</option>
        <option value="yes">downloaded</option>
        <option value="no">pending</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Limit</label>
      <input type="number" id="filter-limit" min="10" max="2000" value="500">
    </div>
    <div class="filter-spacer"></div>
    <button id="apply-filter-btn" class="btn">Apply</button>
    <button id="batch-delete-btn" class="btn btn-danger" disabled>
      Delete selected (<span id="selected-count">0</span>)
    </button>
  </section>

  <main class="table-wrap">
    <table class="feedback-table">
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" id="select-all"></th>
          <th class="col-id">ID</th>
          <th class="col-region">Region</th>
          <th class="col-ts">Timestamp</th>
          <th class="col-version">App version</th>
          <th class="col-env">OS / GPU</th>
          <th class="col-summary">Summary</th>
          <th class="col-email">Email</th>
          <th class="col-size">Size</th>
          <th class="col-status">Status</th>
          <th class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody id="feedback-tbody">
        <tr class="empty-row">
          <td colspan="11">No data yet — click <strong>Refresh</strong> to fetch.</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer class="footer">
    <div class="footer-left">
      <span>Cache: <span id="cache-size">-</span></span>
      <span class="muted" id="row-count"></span>
    </div>
    <div class="footer-right">
      <label>Clean older than
        <input type="number" id="clean-days" min="0" value="60" class="small-input">
        days
      </label>
      <button id="clean-btn" class="btn">Clean</button>
    </div>
  </footer>

  <div id="toast-container"></div>
</div>

<script src="app.js"></script>
</body>
</html>
