<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Camera body -->
  <rect x="55" y="20" width="120" height="70" rx="6" opacity="0.6"/>
  <!-- Lens -->
  <circle cx="115" cy="14" r="16" opacity="0.4"/>
  <circle cx="115" cy="14" r="10" opacity="0.3"/>
  <!-- NiYien A1 device on left side -->
  <rect x="24" y="35" width="22" height="50" rx="3" stroke-width="2" opacity="1"/>
  <!-- LED indicator (facing front/lens) -->
  <circle cx="35" cy="39" r="2" fill="currentColor" opacity="0.8"/>
  <!-- Label (rotated) -->
  <text x="35" y="65" text-anchor="middle" font-size="7" font-family="sans-serif" fill="currentColor" stroke="none" opacity="0.6" transform="rotate(-90, 35, 65)">NiYien A1</text>
  <!-- Arrow showing "front" direction -->
  <line x1="35" y1="29" x2="35" y2="23" stroke-width="1" opacity="0.5"/>
  <polyline points="31,26 35,22 39,26" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
