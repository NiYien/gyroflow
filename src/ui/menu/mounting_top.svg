<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Camera body -->
  <rect x="30" y="45" width="140" height="55" rx="6" opacity="0.6"/>
  <!-- Lens -->
  <circle cx="100" cy="38" r="16" opacity="0.4"/>
  <circle cx="100" cy="38" r="10" opacity="0.3"/>
  <!-- NiYien A1 device on top -->
  <rect x="70" y="14" width="60" height="22" rx="3" stroke-width="2" opacity="1"/>
  <!-- LED indicator (facing front/lens) -->
  <circle cx="100" cy="18" r="2" fill="currentColor" opacity="0.8"/>
  <!-- Label -->
  <text x="100" y="30" text-anchor="middle" font-size="7" font-family="sans-serif" fill="currentColor" stroke="none" opacity="0.6">NiYien A1</text>
  <!-- Arrow showing "front" direction -->
  <line x1="100" y1="8" x2="100" y2="2" stroke-width="1" opacity="0.5"/>
  <polyline points="96,5 100,1 104,5" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
